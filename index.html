<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FizzBuzz</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="container">
            <h1>FizzBuzz</h1>
            
            <div class="inputs">
                <label>Fizz number: <input type="number" id="fizzNum" value="3" min="1"></label>
                <label>Buzz number: <input type="number" id="buzzNum" value="5" min="1"></label>
                <label>Max number: <input type="number" id="maxNum" value="20" min="1" max="100"></label>
                <button onclick="runFizzBuzz()">Run FizzBuzz</button>
            </div>

            <ul id="output"></ul>

        </div>

        <script src="script.js"></script>
    </body>
</html>
